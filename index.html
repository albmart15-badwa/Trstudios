
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Hub | Sincronizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Configuración automática del entorno
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = window.__app_id || 'studio-manager-colectivo';

        // Variables de estado
        let state = { miembros: [], horarios: [], gastos: [], config: { rent: 420 } };

        // 1. Autenticación y Escucha de datos (Sincronización Real-time)
        async function init() {
            await signInAnonymously(auth);
            
            const collections = ['miembros', 'horarios', 'gastos', 'config'];
            collections.forEach(colName => {
                const q = collection(db, 'artifacts', appId, 'public', 'data', colName);
                onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    if (colName === 'config') {
                        state.config = data[0] || { rent: 420 };
                    } else {
                        state.miembros = colName === 'miembros' ? data : state.miembros;
                        state.horarios = colName === 'horarios' ? data : state.horarios;
                        state.gastos = colName === 'gastos' ? data : state.gastos;
                    }
                    render();
                }, (err) => console.error("Error sync:", err));
            });
        }

        // 2. Funciones globales para la interfaz
        window.saveRecord = async (col, id, data) => {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', col, id);
            await setDoc(docRef, data, { merge: true });
        };

        window.removeRecord = async (col, id) => {
            if(!confirm("¿Eliminar este registro?")) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', col, id);
            await deleteDoc(docRef);
        };

        window.togglePago = (id) => {
            const m = state.miembros.find(x => x.id === id);
            window.saveRecord('miembros', id, { pago: m.pago === 'SI' ? 'NO' : 'SI' });
        };

        // 3. Renderizado de la UI
        function render() {
            const cuota = (state.config.rent / (state.miembros.length || 1)).toFixed(2);
            document.getElementById('stat-cuota').innerText = cuota + "€";
            document.getElementById('stat-miembros').innerText = state.miembros.length;
            document.getElementById('rent-val').innerText = state.config.rent + "€";

            // Lista Miembros
            document.getElementById('list-miembros').innerHTML = state.miembros.map(m => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 ${m.pago === 'SI' ? 'border-emerald-500' : 'border-amber-500'}">
                    <div><p class="font-bold text-white">${m.nombre}</p><p class="text-[10px] text-slate-500 uppercase">${m.rol}</p></div>
                    <div class="flex gap-2">
                        <button onclick="togglePago('${m.id}')" class="text-[10px] font-bold px-3 py-1 rounded-lg ${m.pago === 'SI' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-amber-500/10 text-amber-400'}">${m.pago === 'SI' ? 'PAGADO' : 'FALTA'}</button>
                        <button onclick="removeRecord('miembros', '${m.id}')" class="text-slate-600"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');

            // Horarios
            const dias = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
            document.getElementById('list-horarios').innerHTML = dias.map(d => `
                <div class="space-y-2">
                    <p class="text-[9px] font-black text-slate-500 uppercase">${d}</p>
                    <div class="grid gap-1">
                        ${state.horarios.filter(h => h.dia === d).map(h => `
                            <div class="bg-sky-500/10 p-2 rounded-lg flex justify-between border border-sky-500/10">
                                <span class="text-[11px] font-bold text-sky-400">${h.nombre} <small class="text-slate-400 font-normal">${h.tramo}</small></span>
                                <button onclick="removeRecord('horarios', '${h.id}')" class="text-sky-900"><i class="fas fa-times"></i></button>
                            </div>
                        `).join('')}
                        <button onclick="modalAdd('horario', '${d}')" class="text-[10px] text-slate-700 border border-dashed border-slate-800 p-1 rounded-lg">+ Añadir</button>
                    </div>
                </div>
            `).join('');
        }

        window.modalAdd = (type, extra = '') => {
            const body = document.getElementById('form-body');
            document.getElementById('modal').style.display = 'flex';
            if(type === 'miembro') {
                body.innerHTML = `
                    <input type="hidden" name="col" value="miembros">
                    <input type="text" name="nombre" placeholder="Nombre" required class="mb-2 w-full p-3 bg-slate-800 rounded-xl">
                    <input type="text" name="rol" placeholder="Instrumento" required class="w-full p-3 bg-slate-800 rounded-xl">
                    <input type="hidden" name="pago" value="NO">
                `;
            } else if(type === 'horario') {
                body.innerHTML = `
                    <input type="hidden" name="col" value="horarios">
                    <input type="hidden" name="dia" value="${extra}">
                    <select name="nombre" class="w-full p-3 bg-slate-800 rounded-xl mb-2">
                        ${state.miembros.map(m => `<option value="${m.nombre}">${m.nombre}</option>`).join('')}
                    </select>
                    <input type="text" name="tramo" placeholder="Ej: 17:00 - 20:00" required class="w-full p-3 bg-slate-800 rounded-xl">
                `;
            }
        };

        window.closeModal = () => document.getElementById('modal').style.display = 'none';

        document.getElementById('form-universal').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = Object.fromEntries(fd);
            const col = data.col; delete data.col;
            await window.saveRecord(col, Date.now().toString(), data);
            closeModal();
        };

        window.onload = init;
    </script>
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(23, 30, 49, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .view-btn.active { color: #a78bfa; background: rgba(167, 139, 250, 0.1); }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 border-b border-white/5 flex justify-between items-center glass sticky top-0 z-50">
        <h1 class="font-black italic">STUDIO<span class="text-violet-500">HUB</span></h1>
        <div class="text-[10px] font-bold text-slate-500">ALQUILER: <span id="rent-val" class="text-violet-400">---</span></div>
    </header>

    <main class="p-4 space-y-6 max-w-lg mx-auto">
        <!-- Dashboard -->
        <div id="view-dash" class="space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="glass p-4 rounded-3xl border-b-2 border-violet-500">
                    <p class="text-[9px] uppercase text-slate-500 font-bold">Cuota p.p.</p>
                    <div id="stat-cuota" class="text-xl font-black">---</div>
                </div>
                <div class="glass p-4 rounded-3xl border-b-2 border-sky-500">
                    <p class="text-[9px] uppercase text-slate-500 font-bold">Miembros</p>
                    <div id="stat-miembros" class="text-xl font-black">---</div>
                </div>
            </div>
            
            <h2 class="text-lg font-black mt-6 flex justify-between items-center">
                Miembros 
                <button onclick="modalAdd('miembro')" class="bg-violet-600 text-[10px] px-3 py-1 rounded-lg">AÑADIR</button>
            </h2>
            <div id="list-miembros" class="space-y-2"></div>

            <h2 class="text-lg font-black mt-6">Horario Semanal</h2>
            <div id="list-horarios" class="grid grid-cols-1 gap-4"></div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/90 hidden z-[100] items-center justify-center p-6">
        <div class="glass w-full max-w-xs rounded-3xl p-6">
            <form id="form-universal">
                <div id="form-body" class="mb-4 text-white"></div>
                <button type="submit" class="w-full bg-violet-600 py-3 rounded-xl font-bold">GUARDAR</button>
                <button type="button" onclick="closeModal()" class="w-full text-slate-500 text-xs mt-4">CANCELAR</button>
            </form>
        </div>
    </div>

    <!-- Navegación -->
    <nav class="fixed bottom-0 inset-x-0 glass p-4 flex justify-around border-t border-white/5">
        <button class="text-violet-400"><i class="fas fa-layer-group text-xl"></i></button>
        <button onclick="alert('Usa los botones de Añadir en la pantalla')" class="text-slate-600"><i class="fas fa-plus-circle text-xl"></i></button>
    </nav>

</body>
</html>

```
