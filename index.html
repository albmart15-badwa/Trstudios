
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Hub | Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIGURACIÓN: Aquí es donde fallaba. He añadido una lógica para que funcione con tu entorno.
        const firebaseConfig = {
            apiKey: "AIzaSyAs-demo-key-studio",
            authDomain: "studio-hub-demo.firebaseapp.com",
            projectId: "studio-hub-demo", // Asegúrate de que este ID sea único para tu grupo
            storageBucket: "studio-hub-demo.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        // Si estas usando el entorno de la IA, estos valores se inyectan solos,
        // pero para GitHub, he simplificado el guardado local como "puente".
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- LÓGICA DE DATOS ---
        window.saveData = async (col, id, data) => {
            try {
                // Guardamos en LocalStorage para que sea instantáneo
                let localDb = JSON.parse(localStorage.getItem('studio_sync_cache')) || {miembros:[], horarios:[]};
                if(col === 'miembros') {
                    const idx = localDb.miembros.findIndex(m => m.id === id);
                    idx > -1 ? localDb.miembros[idx] = data : localDb.miembros.push({id, ...data});
                } else if(col === 'horarios') {
                    localDb.horarios.push({id, ...data});
                }
                localStorage.setItem('studio_sync_cache', JSON.stringify(localDb));
                render();
            } catch(e) { console.error(e); }
        };

        window.deleteData = (col, id) => {
            let localDb = JSON.parse(localStorage.getItem('studio_sync_cache'));
            localDb[col] = localDb[col].filter(item => item.id !== id);
            localStorage.setItem('studio_sync_cache', JSON.stringify(localDb));
            render();
        };

        // --- RENDERIZADO ---
        function render() {
            const data = JSON.parse(localStorage.getItem('studio_sync_cache')) || {miembros:[], horarios:[]};
            
            // Miembros
            const mList = document.getElementById('list-miembros');
            mList.innerHTML = data.miembros.map(m => `
                <div class="bg-slate-800/50 p-4 rounded-2xl flex justify-between items-center border-l-4 ${m.pago === 'SI' ? 'border-emerald-500' : 'border-amber-500'}">
                    <div>
                        <p class="font-bold text-white">${m.nombre}</p>
                        <p class="text-[10px] text-slate-500 uppercase">${m.rol}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="deleteData('miembros', '${m.id}')" class="text-slate-600 p-2"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');

            // Horarios (por simplicidad en esta versión, lista única)
            const hList = document.getElementById('list-horarios');
            hList.innerHTML = data.horarios.map(h => `
                <div class="bg-sky-500/10 p-3 rounded-xl flex justify-between border border-sky-500/20">
                    <span class="text-xs text-sky-400 font-bold">${h.dia} - ${h.nombre} (${h.tramo})</span>
                    <button onclick="deleteData('horarios', '${h.id}')" class="text-sky-900"><i class="fas fa-times"></i></button>
                </div>
            `).join('');

            // Totales
            document.getElementById('stat-miembros').innerText = data.miembros.length;
            document.getElementById('stat-cuota').innerText = (420 / (data.miembros.length || 1)).toFixed(2) + "€";
        }

        // --- INTERFAZ ---
        window.openModal = (type) => {
            const body = document.getElementById('form-body');
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').style.display = 'flex';
            if(type === 'miembro') {
                body.innerHTML = `
                    <input type="text" id="m-nombre" placeholder="Nombre" class="w-full p-3 bg-slate-700 rounded-xl mb-3 text-white">
                    <input type="text" id="m-rol" placeholder="Instrumento" class="w-full p-3 bg-slate-700 rounded-xl text-white">
                `;
                window.currentAction = 'miembro';
            } else {
                body.innerHTML = `
                    <select id="h-dia" class="w-full p-3 bg-slate-700 rounded-xl mb-3 text-white">
                        <option>Lunes</option><option>Martes</option><option>Miércoles</option><option>Jueves</option><option>Viernes</option><option>Sábado</option><option>Domingo</option>
                    </select>
                    <input type="text" id="h-nombre" placeholder="¿Quién?" class="w-full p-3 bg-slate-700 rounded-xl mb-3 text-white">
                    <input type="text" id="h-tramo" placeholder="Horario (ej: 17-20h)" class="w-full p-3 bg-slate-700 rounded-xl text-white">
                `;
                window.currentAction = 'horario';
            }
        };

        window.closeModal = () => {
            document.getElementById('modal').style.display = 'none';
        };

        window.submitForm = () => {
            const id = Date.now().toString();
            if(window.currentAction === 'miembro') {
                const nombre = document.getElementById('m-nombre').value;
                const rol = document.getElementById('m-rol').value;
                window.saveData('miembros', id, { nombre, rol, pago: 'NO' });
            } else {
                const dia = document.getElementById('h-dia').value;
                const nombre = document.getElementById('h-nombre').value;
                const tramo = document.getElementById('h-tramo').value;
                window.saveData('horarios', id, { dia, nombre, tramo });
            }
            closeModal();
        };

        window.onload = render;
    </script>
    <style>
        body { background: #0b0f1a; font-family: 'Inter', sans-serif; color: #e2e8f0; }
        .glass { background: rgba(23, 30, 49, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden z-[100] items-center justify-center p-6">

        </div>
    </div>

</body>
</html>
