<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Hub | Gestión Colectiva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(23, 30, 49, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .nav-active { color: #a78bfa; background: rgba(167, 139, 250, 0.1); border-radius: 12px; }
        input, select { background: #1a202e !important; color: white !important; border: 1px solid #2d3748 !important; border-radius: 0.75rem !important; padding: 0.75rem !important; width: 100%; }
    </style>
</head>
<body class="pb-32">

    <div class="glass border-b border-white/5 px-6 py-2 flex justify-between items-center text-[10px] font-black text-slate-500 uppercase">
        <div>ALQUILER: <b id="rent-display" class="text-violet-400">420€</b></div>
        <button onclick="exportData()" class="text-violet-400"><i class="fas fa-download mr-1"></i> BACKUP JSON</button>
    </div>

    <main class="max-w-4xl mx-auto p-4 md:p-10 space-y-8">
        <section id="view-dash" class="space-y-6">
            <h1 class="text-4xl font-black text-white">Panel de<br><span class="text-violet-500">Control</span></h1>
            <div id="stats" class="grid grid-cols-2 gap-4">
                <div class="glass p-6 rounded-[2rem] border-b-2 border-violet-500 text-center">
                    <p class="text-[10px] font-black uppercase text-slate-500">Cuota p.p.</p>
                    <div id="stat-cuota" class="text-2xl font-black text-white">0€</div>
                </div>
                <div class="glass p-6 rounded-[2rem] border-b-2 border-emerald-500 text-center">
                    <p class="text-[10px] font-black uppercase text-slate-500">Miembros</p>
                    <div id="stat-miembros" class="text-2xl font-black text-white">0</div>
                </div>
            </div>
            <div class="glass p-6 rounded-[2.5rem]">
                <h3 class="text-xs font-black text-sky-400 uppercase mb-4">Reservas de Hoy</h3>
                <div id="dash-schedule" class="space-y-2"></div>
            </div>
        </section>

        <section id="view-miembros" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black">Miembros</h2>
                <button onclick="openModal('miembro')" class="bg-violet-600 px-4 py-2 rounded-xl font-bold text-xs">AÑADIR</button>
            </div>
            <div id="list-miembros" class="grid gap-3"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass flex justify-around p-4 z-50 rounded-t-[2rem]">
        <button onclick="showView('dash')" class="p-2"><i class="fas fa-home text-xl"></i></button>
        <button onclick="showView('miembros')" class="p-2"><i class="fas fa-users text-xl"></i></button>
    </nav>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden z-[100] items-center justify-center p-6">
        <div class="glass w-full max-w-sm rounded-[2.5rem] p-8">
            <h3 id="modal-title" class="text-xl font-black mb-6 text-white uppercase">Editar</h3>
            <form id="form-universal" class="space-y-4">
                <div id="form-body"></div>
                <button type="submit" class="w-full bg-violet-600 py-4 rounded-2xl font-black text-white">GUARDAR</button>
                <button type="button" onclick="closeModal()" class="w-full text-slate-500 font-bold mt-2">CANCELAR</button>
            </form>
        </div>
    </div>

    <script>
        // BASE DE DATOS LOCAL (Sincronizada por dispositivo)
        let db = JSON.parse(localStorage.getItem('studio_db')) || { miembros: [], horarios: [] };
        let rent = 420;

        function save() {
            localStorage.setItem('studio_db', JSON.stringify(db));
            render();
        }

        function render() {
            const mList = document.getElementById('list-miembros');
            const cuota = (rent / (db.miembros.length || 1)).toFixed(2);
            
            document.getElementById('stat-cuota').innerText = cuota + "€";
            document.getElementById('stat-miembros').innerText = db.miembros.length;

            mList.innerHTML = db.miembros.map(m => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center">
                    <div>
                        <p class="font-bold">${m.nombre}</p>
                        <p class="text-[10px] text-slate-500 uppercase">${m.rol}</p>
                    </div>
                    <button onclick="deleteMiembro('${m.id}')" class="text-red-500 text-xs"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        function showView(v) {
            document.getElementById('view-dash').classList.add('hidden');
            document.getElementById('view-miembros').classList.add('hidden');
            document.getElementById('view-' + v).classList.remove('hidden');
        }

        function openModal(type) {
            const body = document.getElementById('form-body');
            document.getElementById('modal').style.display = 'flex';
            if(type === 'miembro') {
                body.innerHTML = `
                    <input type="text" name="nombre" placeholder="Nombre" required class="mb-2">
                    <input type="text" name="rol" placeholder="Instrumento/Rol" required>
                `;
            }
        }

        document.getElementById('form-universal').onsubmit = (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            db.miembros.push({ id: Date.now(), nombre: fd.get('nombre'), rol: fd.get('rol') });
            closeModal();
            save();
        };

        function deleteMiembro(id) {
            db.miembros = db.miembros.filter(m => m.id != id);
            save();
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "backup_estudio.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        window.onload = render;
    </script>
</body>
      </html>
